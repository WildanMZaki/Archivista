name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Release
    runs-on: windows-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Extract version from tag ──────────────────────────────
      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "📌 Tag: $TAG | Version: $VERSION"

      # ── Setup build tools ─────────────────────────────────────
      - name: Install CMake 4.x and Ninja
        run: |
          pip install cmake --upgrade
          choco install ninja -y
          cmake --version
          gcc --version

      # ── Build Release (.exe) ──────────────────────────────────
      - name: Configure CMake
        run: cmake -S . -B build/release -G "Ninja" -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER=gcc

      - name: Build Archivista
        run: cmake --build build/release -j

      - name: Verify build output
        run: |
          if (!(Test-Path "build\release\Archivista.exe")) {
            Write-Error "Build failed: Archivista.exe not found!"
            exit 1
          }
          Write-Host "✅ Archivista.exe built successfully"

      # ── Build Installer (Inno Setup) ──────────────────────────
      - name: Compile Inno Setup Installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.8
        with:
          path: installer/archivista.iss
          options: /DAppVersion=${{ steps.version.outputs.version }}

      - name: Verify installer output
        run: |
          $installerPath = "installer\Output\Archivista-${{ steps.version.outputs.version }}-Setup.exe"
          if (!(Test-Path $installerPath)) {
            Write-Error "Installer build failed: $installerPath not found!"
            exit 1
          }
          Write-Host "✅ Installer built successfully: $installerPath"

      # ── Detect changelog ──────────────────────────────────────
      - name: Check for changelog file
        id: changelog
        shell: bash
        run: |
          CHANGELOG_FILE="changelogs/${{ steps.version.outputs.tag }}.md"
          if [ -f "$CHANGELOG_FILE" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "path=$CHANGELOG_FILE" >> "$GITHUB_OUTPUT"
            echo "📝 Custom changelog found: $CHANGELOG_FILE"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "📝 No changelog file, will auto-generate release notes"
          fi

      # ── Create GitHub Release ─────────────────────────────────
      - name: Create Release (custom changelog)
        if: steps.changelog.outputs.found == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body_path: ${{ steps.changelog.outputs.path }}
          draft: false
          prerelease: false
          files: |
            build/release/Archivista.exe
            installer/Output/Archivista-${{ steps.version.outputs.version }}-Setup.exe

      - name: Create Release (auto-generated notes)
        if: steps.changelog.outputs.found == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            build/release/Archivista.exe
            installer/Output/Archivista-${{ steps.version.outputs.version }}-Setup.exe
