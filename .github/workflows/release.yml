name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Release
    runs-on: windows-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Extract version from tag ──────────────────────────────
      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "📌 Tag: $TAG | Version: $VERSION"

      # ── Setup build tools ─────────────────────────────────────
      - name: Install Ninja
        run: choco install ninja -y

      # ── Build Release (.exe) ──────────────────────────────────
      - name: Configure CMake
        run: cmake -S . -B build/release -G "Ninja" -DCMAKE_BUILD_TYPE=Release

      - name: Build Archivista
        run: cmake --build build/release -j

      - name: Verify build output
        run: |
          if (!(Test-Path "build\release\Archivista.exe")) {
            Write-Error "Build failed: Archivista.exe not found!"
            exit 1
          }
          Write-Host "✅ Archivista.exe built successfully"

      # ── Build Installer (Inno Setup) ──────────────────────────
      - name: Compile Inno Setup Installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.8
        with:
          path: installer/archivista.iss
          options: /DAppVersion=${{ steps.version.outputs.version }}

      - name: Verify installer output
        run: |
          $installerPath = "installer\Output\Archivista-${{ steps.version.outputs.version }}-Setup.exe"
          if (!(Test-Path $installerPath)) {
            Write-Error "Installer build failed: $installerPath not found!"
            exit 1
          }
          Write-Host "✅ Installer built successfully: $installerPath"

      # ── Create GitHub Release ─────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            build/release/Archivista.exe
            installer/Output/Archivista-${{ steps.version.outputs.version }}-Setup.exe
